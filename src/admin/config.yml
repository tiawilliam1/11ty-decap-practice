backend:
  name: git-gateway
  branch: main

media_folder: "src/uploads"
public_folder: "/uploads"

collections:
  - name: "site_pages"
    label: "Site Pages"
    files:
      - label: "About Me"
        name: "about_page"
        file: "src/_data/about.json"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Intro Text", name: "intro_text", widget: "text" }
          - { label: "Section Title", name: "section_title", widget: "string" }
          - { label: "Section Text", name: "section_text", widget: "text" }

  - name: "posts"
    label: "Articles"
    folder: "src/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "hidden", default: ["posts"] }
